name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-test:
    name: Check and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run -w @josephakern/pi-tree-sitter-cli
